<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>霓 Voice Call UI — Preview</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black: #000000;
  --white: #FFFFFF;
  --surface: #0a0a0a;
  --surface-elevated: #111111;
  --border: #1a1a1a;
  --border-light: #222222;
  --neon-green: #00D26A;
  --neon-green-dim: rgba(0, 210, 106, 0.15);
  --neon-green-glow: rgba(0, 210, 106, 0.4);
  --neon-violet: #8B5CF6;
  --neon-violet-dim: rgba(139, 92, 246, 0.15);
  --neon-violet-glow: rgba(139, 92, 246, 0.3);
  --danger: #FF3B30;
  --danger-glow: rgba(255, 59, 48, 0.3);
  --text-primary: #F5F5F7;
  --text-secondary: #86868B;
  --text-tertiary: #48484A;
  --font: -apple-system, "SF Pro Display", "Helvetica Neue", system-ui, sans-serif;
  --font-mono: "SF Mono", "Cascadia Code", monospace;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-full: 9999px;
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}

body {
  font-family: var(--font);
  background: #111;
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  display: flex;
  justify-content: center;
  gap: 24px;
  padding: 32px 16px;
  flex-wrap: wrap;
}

h2 {
  text-align: center;
  color: var(--neon-green);
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.phone-frame {
  width: 375px;
  height: 812px;
  background: var(--black);
  border-radius: 40px;
  border: 2px solid var(--border-light);
  overflow: hidden;
  position: relative;
  flex-shrink: 0;
}

/* ===== LOGIN ===== */
.login-screen {
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px;
}

.avatar-circle {
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  font-weight: 800;
  color: white;
  background: linear-gradient(135deg, var(--neon-green), var(--neon-violet));
  user-select: none;
}

.avatar-sm { width: 72px; height: 72px; font-size: 2rem; }
.avatar-lg { width: 96px; height: 96px; font-size: 2.5rem; }
.avatar-call { width: 100px; height: 100px; font-size: 2.75rem; position: relative; z-index: 2; }

.login-title { font-size: 1.5rem; font-weight: 700; color: white; margin: 20px 0 4px; }
.login-sub { font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 40px; }

.input-mock {
  width: 100%;
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  color: var(--text-tertiary);
  font-size: 1rem;
  margin-bottom: 12px;
}

.input-mock.focused {
  border-color: var(--neon-green);
  box-shadow: 0 0 0 3px var(--neon-green-dim);
  color: var(--text-primary);
}

.btn-green {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: var(--radius-full);
  background: var(--neon-green);
  color: var(--black);
  font-size: 1rem;
  font-weight: 700;
  margin-top: 8px;
  cursor: pointer;
}

/* ===== HOME ===== */
.home-screen {
  height: 100%;
  display: flex;
  flex-direction: column;
  padding: 16px;
}

.home-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
}

.dot-green {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--neon-green);
  box-shadow: 0 0 6px var(--neon-green-glow);
  display: inline-block;
  margin-right: 6px;
}

.home-top span { font-size: 0.75rem; color: var(--text-tertiary); }

.btn-ghost-sm {
  padding: 5px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: transparent;
  color: var(--text-secondary);
  font-size: 0.75rem;
}

.home-center {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding-bottom: 15%;
}

.home-center h3 {
  font-size: 1.75rem;
  font-weight: 700;
  color: white;
}

.home-center p {
  font-size: 0.875rem;
  color: var(--text-secondary);
}

.home-bottom {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: 48px;
  gap: 6px;
}

.call-circle {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: var(--neon-green);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 20px var(--neon-green-dim);
  cursor: pointer;
  transition: transform 0.2s var(--ease-spring), box-shadow 0.3s;
}

.call-circle:hover {
  transform: scale(1.08);
  box-shadow: 0 0 40px var(--neon-green-glow), 0 0 80px var(--neon-green-dim);
}

.call-circle svg { color: white; }

.call-circle-label { font-size: 0.8rem; color: var(--text-secondary); }

/* ===== CALL ===== */
.call-screen {
  height: 100%;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

.call-screen::before {
  content: '';
  position: absolute;
  top: -40%;
  left: 50%;
  transform: translateX(-50%);
  width: 200%;
  height: 80%;
  background: radial-gradient(ellipse at center, var(--neon-green-dim) 0%, transparent 60%);
  opacity: 0.3;
  pointer-events: none;
  animation: breathe 4s ease-in-out infinite;
}

.call-top-info {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 16px 16px;
  position: relative; z-index: 1;
}

.call-top-info .status { font-size: 0.875rem; color: var(--neon-green); animation: textPulse 1.5s ease-in-out infinite; }
.call-top-info .timer { font-family: var(--font-mono); font-size: 0.85rem; color: var(--text-tertiary); margin-top: 4px; }

.call-avatar-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  position: relative; z-index: 1;
  padding-bottom: 10%;
}

.avatar-ring {
  position: relative;
  width: 120px; height: 120px;
  display: flex; align-items: center; justify-content: center;
}

.pulse-ring {
  position: absolute;
  inset: -10px;
  border-radius: 50%;
  border: 1.5px solid var(--neon-green);
  opacity: 0;
  animation: ringPulse 2s ease-out infinite;
}

.pulse-ring.d { animation-delay: 0.8s; }

.call-avatar-area h3 { font-size: 1.5rem; font-weight: 700; color: white; }
.call-avatar-area .activity { font-size: 0.8rem; color: var(--neon-green); animation: textPulse 1.2s ease-in-out infinite; }

.wave-bar {
  height: 48px;
  margin: 0 24px;
  background: repeating-linear-gradient(
    90deg,
    var(--neon-green-dim) 0px,
    transparent 2px,
    transparent 6px
  );
  border-radius: var(--radius-lg);
  position: relative; z-index: 1;
  overflow: hidden;
}

.wave-bar::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg,
    transparent,
    var(--neon-green-dim),
    var(--neon-violet-dim),
    transparent
  );
  animation: waveSlide 3s linear infinite;
}

.call-actions-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  padding: 20px 16px 40px;
  position: relative; z-index: 1;
}

.action-row {
  display: flex;
  justify-content: center;
  gap: 40px;
}

.action-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.action-circle {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--surface-elevated);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-primary);
  cursor: pointer;
  transition: transform 0.2s var(--ease-spring), background 0.2s, box-shadow 0.2s;
}

.action-circle:hover { transform: scale(1.08); background: var(--border-light); }
.action-circle.active-green { background: var(--neon-green); color: var(--black); box-shadow: 0 0 16px var(--neon-green-glow); }
.action-circle.active-red { background: var(--danger); color: white; box-shadow: 0 0 16px var(--danger-glow); }

.action-item span { font-size: 0.7rem; color: var(--text-tertiary); }

.hangup-circle {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: var(--danger);
  display: flex; align-items: center; justify-content: center;
  color: white;
  box-shadow: 0 0 20px var(--danger-glow);
  cursor: pointer;
  transition: transform 0.2s var(--ease-spring), box-shadow 0.2s;
}

.hangup-circle:hover {
  transform: scale(1.08);
  box-shadow: 0 0 40px var(--danger-glow);
}

.transcript-peek {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  padding: 8px 16px 16px;
  z-index: 10;
}

.transcript-peek .handle {
  width: 32px; height: 3px;
  border-radius: 2px;
  background: var(--border-light);
  margin: 0 auto 4px;
}

.transcript-peek .label { font-size: 0.7rem; color: var(--text-tertiary); text-align: center; letter-spacing: 0.05em; }

@keyframes ringPulse {
  0% { transform: scale(1); opacity: 0.6; }
  100% { transform: scale(1.6); opacity: 0; }
}

@keyframes breathe {
  0%, 100% { opacity: 0.2; }
  50% { opacity: 0.4; }
}

@keyframes textPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

@keyframes waveSlide {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

@keyframes neonGlow {
  0%, 100% { box-shadow: 0 0 10px var(--neon-green-dim), 0 0 30px var(--neon-green-dim); }
  50% { box-shadow: 0 0 20px var(--neon-green-glow), 0 0 60px var(--neon-green-dim); }
}

/* Phone icon SVG */
.icon { width: 24px; height: 24px; display: inline-block; }
</style>
</head>
<body>

</div>
